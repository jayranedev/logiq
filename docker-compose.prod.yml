# Production overlay for EC2 deployment.
# Usage:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this overrides vs dev:
#  - Backend: no volume mount (bake code into image), no --reload
#  - Frontend: build production bundle, serve with nginx instead of vite dev
#  - Adds nginx reverse proxy on port 80
#  - Removes exposed container ports (nginx is the only public entry point)

services:
  backend:
    build: ./backend
    volumes: []  # no live mount in prod — code is baked into image
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DATABASE_URL: postgresql+asyncpg://logiq:logiq123@postgres:5432/logiqdb
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-logiq-prod-secret-change-me}
    ports: []  # not exposed directly — nginx proxies
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports: []  # not exposed — nginx proxies
    environment:
      VITE_API_URL: ""  # empty = relative URL (nginx handles routing)
      VITE_WS_URL: ""
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # SSL certs (optional)
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped
