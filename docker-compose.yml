services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: logiq
      POSTGRES_PASSWORD: logiq123
      POSTGRES_DB: logiqdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U logiq -d logiqdb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://logiq:logiq123@postgres:5432/logiqdb
      REDIS_URL: redis://redis:6379
      SECRET_KEY: logiq-hackathon-secret-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/drivers')"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  simulator:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://logiq:logiq123@postgres:5432/logiqdb
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
         condition: service_healthy
    volumes:
      - ./backend:/app
    command: python scripts/gps_simulator.py

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws/tracking
      VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  postgres_data:
